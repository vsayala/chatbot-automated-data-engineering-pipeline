app_name: "agentic-data-engineering-cicd"
integration_mode: "connected"
deployment_strategy: "dev_first_promotion"

azure_devops:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  board_url: "https://dev.azure.com/your-org/data-engineering/_boards/board"
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: "" # keep empty and use env/Key Vault in production
  mock_data_path: "sample_data/work_items.json"
  priority_field_name: "Microsoft.VSTS.Common.Priority"
  repo_hint_tag_prefix: "repo:"
  wiql_query: "Select [System.Id], [System.Title], [System.WorkItemType], [Microsoft.VSTS.Common.Priority] From WorkItems Where [System.TeamProject] = @project And [System.WorkItemType] In ('Product Backlog Item', 'Bug', 'User Story') And [System.State] <> 'Closed' Order By [Microsoft.VSTS.Common.Priority] Asc, [System.ChangedDate] Desc"

azure_pipelines:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  pipeline_name_prefix: "de-cicd"
  pipeline_url: "https://dev.azure.com/your-org/data-engineering/_build"
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: ""

azure_repos:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  repository_name: "data-engineering-repo"
  repository_url: "https://dev.azure.com/your-org/data-engineering/_git/data-engineering-repo"
  default_base_branch: "main"
  branch_prefix: "feature/pbi-"
  local_checkout_path: "."
  local_checkout_root: "."
  allow_multi_repo_routing: true
  auto_create_repository_if_missing: true
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: ""
  dry_run: false

databricks:
  workspace_urls:
    dev: "https://adb-dev.azuredatabricks.net"
  token_env: "DATABRICKS_TOKEN"
  token: ""
  job_yaml_folder: "jobs"

approvals:
  mode: "api"
  timeout_seconds: 1800
  auto_approve_stages: []
  state_file: "state/approvals_state.json"

logging:
  log_dir: "logs"
  log_level: "INFO"

prompts:
  enabled: true
  templates_path: "config/prompts.yaml"
  llm_enabled: true
  llm_endpoint_url: "http://127.0.0.1:11434/v1/chat/completions"
  llm_model: "gpt-4o-mini"
  llm_api_key_env: "LLM_API_KEY"
  llm_api_key: ""

mcp:
  enabled: true
  servers:
    azure_devops_mcp: "http://localhost:3001/mcp"
    databricks_mcp: "http://localhost:3002/mcp"
  server_tokens:
    azure_devops_mcp: ""
    databricks_mcp: ""
  request_timeout_seconds: 30

security:
  strict_private_mode: true
  enforce_internal_llm_endpoint: true
  enforce_internal_mcp_endpoints: true
  internal_hostname_suffixes: ["localhost", "127.0.0.1", ".local", ".internal", ".corp", ".intranet"]
  allow_private_ip_ranges: true

workflow:
  stage_sequence: ["dev", "qe", "stg", "prod"]
  databricks_apply_in_stages: ["dev"]
  hil_approval_stages: ["qe", "stg", "prod"]
  hil_approval_for_repo_actions: true

runtime:
  poll_interval_seconds: 60
  max_work_items_per_run: 3
  enable_repo_automation: true
  run_basic_tests: true
  basic_test_command: "python3 -m pytest -q tests/unit"
  auto_create_pr: true
  require_preflight_before_run: true
  fail_fast: true
  enable_idempotency: true
  idempotency_store_path: "state/idempotency_state.json"
  retry_attempts: 3
  retry_initial_delay_seconds: 1.0
  retry_max_delay_seconds: 8.0
  retry_backoff_multiplier: 2.0
  fail_on_mcp_error: true
  enable_failure_remediation: true
  max_failure_remediation_attempts: 2
  require_hil_approval_for_remediation: true

learning_store_path: "state/learning_memory.json"
