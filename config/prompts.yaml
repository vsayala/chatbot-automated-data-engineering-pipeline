requirement_summary: |
  You are processing a data engineering work item for an Azure-first platform.
  Title: {title}
  Description: {description}
  Acceptance Criteria: {acceptance_criteria}
  Priority: {priority}
  Target Repo: {target_repo}
  MCP Status: {mcp_status}

  Generate a concise execution summary that covers repository impact, ingestion intent,
  and release-safety expectations for human-in-the-loop approvals.

approval_suggestion: |
  You are assisting a human approver for deployment stage {stage}.
  Stage risk: {risk_level}
  Deployment summary: {summary}
  Required checklist: {checklist}

  Provide a concise recommendation:
  - whether to approve or hold
  - top 2 risks
  - top 2 validation steps

failure_remediation: |
  You are diagnosing a CI/CD pipeline failure for a data engineering deployment.
  Environment: {environment}
  Attempt: {attempt}
  Target table: {target_table}
  Repo: {repo}
  Ingestion mode: {ingestion_mode}
  Failure context:
  {failure_context}

  Return concise remediation guidance:
  - probable root cause
  - exact files/notebooks likely impacted
  - minimal safe fix steps
  - smoke tests to run after fix
