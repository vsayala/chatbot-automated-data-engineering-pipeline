app_name: "agentic-data-engineering-cicd"
local_mode: true

azure_devops:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  board_url: "https://dev.azure.com/your-org/data-engineering/_boards/board"
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: "" # optional direct token for local experiments (not recommended for real use)
  mock_data_path: "sample_data/work_items.json"
  priority_field_name: "Microsoft.VSTS.Common.Priority"
  repo_hint_tag_prefix: "repo:"
  wiql_query: "Select [System.Id], [System.Title], [System.WorkItemType], [Microsoft.VSTS.Common.Priority] From WorkItems Where [System.TeamProject] = @project And [System.WorkItemType] In ('Product Backlog Item', 'Bug', 'User Story') And [System.State] <> 'Closed' Order By [Microsoft.VSTS.Common.Priority] Asc, [System.ChangedDate] Desc"

azure_pipelines:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  pipeline_name_prefix: "de-cicd"
  pipeline_url: "https://dev.azure.com/your-org/data-engineering/_build"
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: ""

azure_repos:
  organization_url: "https://dev.azure.com/your-org"
  project: "data-engineering"
  repository_name: "data-engineering-repo"
  repository_url: "https://dev.azure.com/your-org/data-engineering/_git/data-engineering-repo"
  default_base_branch: "main"
  branch_prefix: "feature/pbi-"
  local_checkout_path: "."
  personal_access_token_env: "AZDO_PAT"
  personal_access_token: ""
  dry_run: true

databricks:
  workspace_urls:
    dev: "https://adb-dev.azuredatabricks.net"
    qe: "https://adb-qe.azuredatabricks.net"
    stg: "https://adb-stg.azuredatabricks.net"
    prod: "https://adb-prod.azuredatabricks.net"
  token_env: "DATABRICKS_TOKEN"
  token: ""
  job_yaml_folder: "jobs"

approvals:
  mode: "api"
  timeout_seconds: 1200
  auto_approve_stages:
    - "dev"
  state_file: "state/approvals_state.json"

logging:
  log_dir: "logs"
  log_level: "INFO"

prompts:
  enabled: true
  templates_path: "config/prompts.yaml"
  llm_enabled: false
  llm_endpoint_url: ""
  llm_model: "gpt-4o-mini"
  llm_api_key_env: "LLM_API_KEY"
  llm_api_key: ""

mcp:
  enabled: false
  servers: {}
  server_tokens: {}

runtime:
  poll_interval_seconds: 30
  max_work_items_per_run: 1
  enable_repo_automation: true
  run_basic_tests: true
  basic_test_command: "python3 -m pytest -q tests/unit"
  auto_create_pr: true

learning_store_path: "state/learning_memory.json"
